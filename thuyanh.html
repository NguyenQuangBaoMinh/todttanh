<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Babe Thuý Anh ❤️</title>
    <style>
        /* Reset cơ bản */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Nền vũ trụ lãng mạn */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(45deg, #1a001a, #4d0026, #1a0000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Vùng chứa trung tâm */
        .container {
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Trái tim chính giật đùng đùng và phát sáng */
        .heart-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            animation: strongHeartbeat 1s infinite; /* Nhịp đập nhanh, mạnh */
            margin-bottom: 60px;
        }

        .heart {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #ff0040;
            transform: rotate(-45deg);
            box-shadow: 0 0 50px #ff0040, 0 0 100px #ff0040; /* Hào quang chói loá */
            top: 10px;
            left: 10px;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #ff0040;
            border-radius: 50%;
            box-shadow: 0 0 50px #ff0040;
        }

        .heart::before {
            top: -50px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 50px;
        }

        /* Hiệu ứng nhịp đập mạnh */
        @keyframes strongHeartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.4); } /* Nở to đột ngột */
            30% { transform: scale(1); }
            45% { transform: scale(1.3); } /* Đập nhịp 2 */
            70% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        /* Hiệu ứng chữ Neon lãng mạn */
        .message {
            color: #fff;
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #ff0040,
                0 0 40px #ff0040,
                0 0 80px #ff0040;
            animation: neonFlicker 2s infinite alternate;
            padding: 0 20px;
            line-height: 1.4;
        }

        .subtitle {
            color: #ff99bb;
            font-size: 1.5rem;
            margin-top: 15px;
            font-style: italic;
            opacity: 0;
            animation: fadeIn 3s 1s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(-10px); }
        }

        @keyframes neonFlicker {
            0% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #ff0040, 0 0 40px #ff0040; }
            100% { text-shadow: 0 0 10px #fff, 0 0 20px #ff0040, 0 0 40px #ff0040, 0 0 80px #ff0040, 0 0 100px #ff0040; }
        }

        /* Mưa trái tim uốn lượn */
        .falling-heart {
            position: absolute;
            top: -10%;
            color: #ff0040;
            pointer-events: none;
            animation: fall 4s linear infinite, sway 2s ease-in-out infinite alternate;
            text-shadow: 0 0 10px #ff0040;
            z-index: 1;
        }

        @keyframes fall {
            0% { top: -10%; opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        @keyframes sway {
            0% { transform: translateX(0px) rotate(0deg); }
            100% { transform: translateX(50px) rotate(45deg); }
        }

        /* Hiệu ứng nổ trái tim khi click */
        .burst-heart {
            position: absolute;
            color: #ff3366;
            font-size: 1.5rem;
            pointer-events: none;
            animation: burst 1s ease-out forwards;
            z-index: 20;
            text-shadow: 0 0 10px #ff3366;
        }

        @keyframes burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Đáp ứng điện thoại */
        @media (max-width: 600px) {
            .message { font-size: 2rem; }
            .subtitle { font-size: 1.2rem; }
            .heart-wrapper { transform: scale(0.8); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-wrapper">
            <div class="heart"></div>
        </div>
        <div class="message">Chúc babe ngủ ngon và mơ đẹp<br> Thuý Anh ❤️</div>
        <div class="subtitle">(Chạm vào màn hình đi babe ✨)</div>
    </div>

    <script>
        // --- 1. Mưa trái tim uốn lượn ---
        function createFallingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            heart.innerHTML = '❤';
            
            // Random vị trí, kích thước, và thời gian
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's'; /* fall duration */
            heart.style.fontSize = Math.random() * 1.5 + 0.8 + 'rem';
            
            // Đổi màu ngẫu nhiên cho phong phú
            const colors = ['#ff0040', '#ff6699', '#ff99bb', '#ffffff'];
            heart.style.color = colors[Math.floor(Math.random() * colors.length)];
            
            document.body.appendChild(heart);
            
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createFallingHeart, 200); // 0.2s rớt 1 trái

        // --- 2. Bắn tim khi chạm/click vào màn hình ---
        document.addEventListener('click', function(e) {
            createBurst(e.clientX, e.clientY);
        });
        document.addEventListener('touchstart', function(e) {
            const touch = e.touches[0];
            createBurst(touch.clientX, touch.clientY);
        });

        function createBurst(x, y) {
            // Tạo 8-12 trái tim nhỏ văng ra từ vị trí chạm
            const numHearts = Math.floor(Math.random() * 5) + 8; 
            
            for (let i = 0; i < numHearts; i++) {
                const heart = document.createElement('div');
                heart.classList.add('burst-heart');
                heart.innerHTML = '💖';
                
                // Đặt vị trí xuất phát tại điểm click
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';
                
                // Tính toán hướng văng ngẫu nhiên (tx, ty)
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 100 + 50; // Văng xa bao nhiêu
                const tx = Math.cos(angle) * velocity + 'px';
                const ty = Math.sin(angle) * velocity + 'px';
                
                heart.style.setProperty('--tx', tx);
                heart.style.setProperty('--ty', ty);
                
                document.body.appendChild(heart);
                
                setTimeout(() => { heart.remove(); }, 1000);
            }
        }
    </script>
</body>
</html>
